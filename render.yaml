# Xóa file cũ
rm render.yaml
git add render.yaml
git commit -m "Remove old render.yaml"

# Tạo file mới với nội dung sạch
cat > render.yaml << 'EOF'
services:
  - type: web
    name: sentiment-drl-api
    runtime: python
    plan: standard
    region: singapore
    buildCommand: cd backend && pip install -r requirements.txt && python -c "import nltk; nltk.download('punkt'); nltk.download('stopwords')"
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentiment-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: MODEL_DIR
        value: /opt/render/project/src/models
      - key: CORS_ORIGINS
        value: "https://sentiment-drl-dashboard.onrender.com,https://*.vercel.app,http://localhost:3000"

  - type: web
    name: sentiment-drl-dashboard
    runtime: static
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: "18.17.0"
      - key: VITE_API_URL
        value: "https://sentiment-drl-api.onrender.com/api/v1"

  - type: worker
    name: sentiment-drl-worker
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentiment-redis
          property: connectionString
      - key: C_FORCE_ROOT
        value: "true"

  - type: worker
    name: sentiment-drl-scheduler
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.celery_app beat --loglevel=info
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentiment-redis
          property: connectionString

databases:
  - name: sentiment-db
    plan: starter
    region: singapore
    ipAllowList: []

redis:
  - name: sentiment-redis
    plan: starter
    region: singapore
EOF

git add render.yaml
git commit -m "Add clean render.yaml"
git push origin main
