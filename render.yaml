services:
  - type: web
    name: sentiment-analysis-drl
    runtime: docker
    plan: standard
    region: singapore
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "10000"

databases:
  - name: sentiment-db
    plan: starter
    region: singapore

redis:
  - name: sentiment-redis
    plan: starter
    region: singapore
