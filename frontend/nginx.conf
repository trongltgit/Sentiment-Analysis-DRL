server {
    listen 10000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Cache static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # API PROXY (quan trọng nhất)
    # ============================================
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeout rất dài cho AI processing
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Debug headers
        add_header X-Proxy-Status $upstream_status always;
        add_header X-Proxy-Time $upstream_response_time always;
    }

    # Health check - timeout ngắn hơn
    location /api/v1/health {
        proxy_pass http://127.0.0.1:8000/api/v1/health;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ============================================
    # SPA ROUTING (React/Vite)
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache control cho HTML (không cache)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ============================================
    # ERROR HANDLING
    # ============================================
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
